<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <meta name="robots" content="noindex" />
</head>
<body>
  <script>
    (function () {
      const targetOrigin = "https://trendlist.co.uk";

      let path = window.location.pathname || "/";
      path = path.replace(/\/index\.html$/i, "/");   // strip index.html
      path = path.replace(/\/{2,}/g, "/");          // kill double slashes

      window.location.replace(
        targetOrigin + path + window.location.search + window.location.hash
      );
    })();
  </script>
</body>
</html>

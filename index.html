<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <meta name="robots" content="noindex" />
</head>
<body>
  <p>Redirecting…</p>
  <script>
    (function () {
      const targetOrigin = "https://trendlist.co.uk";

      // current path like "/index.html" or "/foo/bar"
      let path = window.location.pathname || "/";

      // strip trailing "index.html"
      path = path.replace(/\/index\.html$/i, "/");

      // avoid accidental double slashes
      path = path.replace(/\/{2,}/g, "/");

      const url = targetOrigin + path + window.location.search + window.location.hash;
      window.location.replace(url);
    })();
  </script>
</body>
</html>
